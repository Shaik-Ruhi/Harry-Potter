name: Deploy Backend to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render-deploy-hook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Skip Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "Set RENDER_DEPLOY_HOOK_URL in GitHub repository secrets to deploy the backend."
