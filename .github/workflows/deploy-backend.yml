name: Deploy Backend to Render

on:
  push:
    branches:
      - main

jobs:
  render-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm install
      - run: npx @render/cli deploy --service-id ${{ secrets.RENDER_BACKEND_SERVICE_ID }} --api-key ${{ secrets.RENDER_API_KEY }} --wait
